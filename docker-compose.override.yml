services:
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      - ./certs/dgk_ca.pem:/tmp/dgk_ca.pem:ro
      - ./ca_wrapper.sh:/ca_wrapper.sh:ro
      - ./defaults.py:/app/tracecat/tiers/defaults.py:ro
      - ./defaults.py:/app/.venv/lib/python3.12/site-packages/tracecat/tiers/defaults.py:ro
    entrypoint: ["/bin/bash", "/ca_wrapper.sh"]
    command: ["python3", "-m", "uvicorn", "tracecat.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

  worker:
    volumes:
      - ./defaults.py:/app/tracecat/tiers/defaults.py:ro
      - ./defaults.py:/app/.venv/lib/python3.12/site-packages/tracecat/tiers/defaults.py:ro

  executor:
    volumes:
      - ./defaults.py:/app/tracecat/tiers/defaults.py:ro
      - ./defaults.py:/app/.venv/lib/python3.12/site-packages/tracecat/tiers/defaults.py:ro

  agent-executor:
    volumes:
      - ./certs/dgk_ca.pem:/tmp/dgk_ca.pem:ro
      - ./ca_wrapper.sh:/ca_wrapper.sh:ro
      - ./defaults.py:/app/tracecat/tiers/defaults.py:ro
      - ./defaults.py:/app/.venv/lib/python3.12/site-packages/tracecat/tiers/defaults.py:ro
      - ./tracecat/agent/sandbox/llm_proxy.py:/app/tracecat/agent/sandbox/llm_proxy.py:ro
    entrypoint: ["/bin/bash", "/ca_wrapper.sh"]

  agent-worker:
    volumes:
      - ./certs/dgk_ca.pem:/tmp/dgk_ca.pem:ro
      - ./ca_wrapper.sh:/ca_wrapper.sh:ro
      - ./defaults.py:/app/tracecat/tiers/defaults.py:ro
      - ./defaults.py:/app/.venv/lib/python3.12/site-packages/tracecat/tiers/defaults.py:ro
      - ./tracecat/agent/sandbox/llm_proxy.py:/app/tracecat/agent/sandbox/llm_proxy.py:ro
    entrypoint: ["/bin/bash", "/ca_wrapper.sh"]

  litellm:
    environment:
      GROQ_API_KEY: "${GROQ_API_KEY}"
    volumes:
      - ./certs/dgk_ca.pem:/tmp/dgk_ca.pem:ro
      - ./ca_wrapper.sh:/ca_wrapper.sh:ro
      - ./tracecat/agent/litellm_config.yaml:/app/tracecat/agent/litellm_config.yaml:ro
      - ./tracecat/agent/gateway.py:/app/tracecat/agent/gateway.py:ro
    entrypoint: ["/bin/bash", "/ca_wrapper.sh"]

  soc-mcp:
    build: ./soc-mcp
    environment:
      SPLUNK_BASE_URL: "${SPLUNK_BASE_URL}"
      SPLUNK_TOKEN: "${SPLUNK_TOKEN}"
      SPLUNK_VERIFY_SSL: "${SPLUNK_VERIFY_SSL}"
      CORTEX_API_URL: "${CORTEX_API_URL}"
      CORTEX_API_KEY: "${CORTEX_API_KEY}"
      CORTEX_API_KEY_ID: "${CORTEX_API_KEY_ID}"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8100"
    ports:
      - "8100:8100"
    networks:
      - core
    restart: unless-stopped

  soc-mcp-actions:
    build: ./soc-mcp
    command: ["python", "server_actions.py"]
    environment:
      CORTEX_API_URL: "${CORTEX_API_URL}"
      CORTEX_API_KEY: "${CORTEX_API_KEY}"
      CORTEX_API_KEY_ID: "${CORTEX_API_KEY_ID}"
      MCP_HOST: "0.0.0.0"
      MCP_ACTIONS_PORT: "8101"
    ports:
      - "8101:8101"
    networks:
      - core
    restart: unless-stopped
